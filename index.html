<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brooklyn Bat Co.</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
    background:#f4f6f8;
    color: white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 15px;
    text-align:center;
}

.section {
      background: #333;
      padding: 24px;
      margin: 24px 0;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: left;
}

.section h2 {
    margin-top: 0;
    text-align: center;
}

.logo{
    max-width:100%;
}

h1{
    margin-bottom:10px;
    color: white;
}

.contact{
    margin-top:30px;
    font-size:18px;
}

.contact p,
.pricing p {
    margin: 8px 0;
    font-size: 17px;
    color: white;
}

.holding{
    text-align: left;
}

.bat{
    width: 100%;
    max-width: 500px;
    height: auto;
    display: block;
    margin: 0 auto 12px auto;
    border-radius: 10px;
}

.holding p{
    text-align: center;
}

.pricing-note {
    font-size: 14px;
    color: #666;
    margin-top: 12px;
    text-align: center;
}

.colors-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px;
    margin-top: 18px;
}

.color-card {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    background: #fafafa;
}

.swatch {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    margin: 0 auto 10px;
    border: 1px solid #ccc;
}

.socials{
    margin-top:15px;
    color: white;
}

.socials a{
    display:inline-block;
    margin:10px;
    padding:10px 18px;
    text-decoration:none;
    border-radius:6px;
    background:#333;
    color:white;
    font-size:15px;
}

.socials a:hover{
    background:#555;
}

footer{
    margin-top:20px;
    font-size:14px;
    color: white;
}

@media (max-width: 600px) {
      .container {
        padding: 24px 14px;
      }

      .section {
        padding: 18px;
      }
}

</style>

</head>

<body style="background-color: black;">

<div class="container">

<!-- Company Logo -->
<img src="logo.jpg" alt="Company Logo" class="logo">

<h1>Brooklyn Bat Co.</h1>
<p>Contact us via email or Instagram DM to place your order!</p>
